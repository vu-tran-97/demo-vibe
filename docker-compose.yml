services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16
    container_name: demo-vibe-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo_vibe
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - demo-vibe-net

  # ── Backend (NestJS — custom image) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: demo-vibe-backend:latest
    container_name: demo-vibe-backend
    restart: unless-stopped
    ports:
      - "3001:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/demo_vibe
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - demo-vibe-net

  # ── Jenkins CI/CD (builds Frontend image via pipeline) ──
  jenkins:
    image: jenkins/jenkins:lts
    container_name: demo-vibe-jenkins
    profiles: ["ci"]
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djava.awt.headless=true -Djenkins.install.runSetupWizard=true"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - demo-vibe-net

volumes:
  postgres-data:
    driver: local
  jenkins-data:
    driver: local

networks:
  demo-vibe-net:
    driver: bridge
