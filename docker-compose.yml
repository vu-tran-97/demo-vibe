services:
  # ── MongoDB (custom image with init script baked in) ──
  mongodb:
    build:
      context: ./docker/db
      dockerfile: Dockerfile
    image: demo-vibe-mongo:latest
    container_name: demo-vibe-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }"
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - demo-vibe-net

  # ── Backend (NestJS — custom image) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: demo-vibe-backend:latest
    container_name: demo-vibe-backend
    restart: unless-stopped
    ports:
      - "3001:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mongodb://mongodb:27017/demo-vibe?replicaSet=rs0&directConnection=true
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - demo-vibe-net

  # ── Jenkins CI/CD (builds Frontend image via pipeline) ──
  jenkins:
    image: jenkins/jenkins:lts
    container_name: demo-vibe-jenkins
    profiles: ["ci"]
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djava.awt.headless=true -Djenkins.install.runSetupWizard=true"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - demo-vibe-net

volumes:
  mongo-data:
    driver: local
  jenkins-data:
    driver: local

networks:
  demo-vibe-net:
    driver: bridge
