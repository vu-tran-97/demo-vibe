openapi: 3.0.3
info:
  title: Demo Vibe E-Commerce API
  description: |
    REST API for the Demo Vibe e-commerce platform built with NestJS, Prisma ORM, and MongoDB.

    All successful responses are wrapped in a standard envelope:
    ```json
    { "success": true, "data": <T> }
    ```
    All error responses follow:
    ```json
    { "success": false, "data": null, "error": "<ERROR_CODE>", "message": "<human-readable message>" }
    ```
  version: 1.0.0
  contact:
    name: ASTRA Team

servers:
  - url: http://localhost:4000
    description: Local development server

tags:
  - name: Auth
    description: Authentication and account management
  - name: Auth - Social
    description: OAuth2 social login (Google, Kakao, Naver)
  - name: Products
    description: Product catalog management
  - name: Orders
    description: Buyer order management
  - name: Orders - Seller
    description: Seller sales and fulfillment management
  - name: Admin - Dashboard
    description: Admin dashboard overview
  - name: Admin - Users
    description: Admin user management
  - name: Board
    description: Community board posts and comments
  - name: Search
    description: Full-text product search and suggestions

security:
  - BearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthTokens'
        '409':
          description: Email or nickname already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthTokens'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account suspended or inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Null'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using a refresh token (token rotation)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_RefreshResult'
        '401':
          description: Invalid, expired, or reused refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Message'
        '400':
          description: Invalid or expired verification token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent (always succeeds to prevent user enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Message'

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Message'
        '400':
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/profile:
    patch:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'
        '409':
          description: Nickname already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/password:
    patch:
      tags: [Auth]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed (all refresh tokens revoked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Message'
        '400':
          description: Current password incorrect or new password same as old
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/account:
    delete:
      tags: [Auth]
      summary: Soft-delete current user account
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Message'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────
  # Auth - Social OAuth2
  # ──────────────────────────────────────────────
  /api/auth/social/{provider}:
    get:
      tags: [Auth - Social]
      summary: Initiate OAuth2 authorization flow
      description: Redirects the user to the OAuth2 provider's authorization page. Sets an `oauth_state` cookie for CSRF protection.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, kakao, naver]
      responses:
        '302':
          description: Redirect to OAuth2 provider

  /api/auth/social/{provider}/callback:
    get:
      tags: [Auth - Social]
      summary: OAuth2 callback handler
      description: Handles the callback from the OAuth2 provider. Validates CSRF state, exchanges the authorization code for tokens, and redirects to the frontend with tokens in query params.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, kakao, naver]
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with tokens or error in query params

  # ──────────────────────────────────────────────
  # Products
  # ──────────────────────────────────────────────
  /api/products:
    get:
      tags: [Products]
      summary: List products (public, with filters)
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: category
          in: query
          schema:
            type: string
            enum: [CERAMICS, TEXTILES, ART, JEWELRY, HOME, FOOD]
        - name: categories
          in: query
          description: Comma-separated list of categories
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, ACTV, SOLD_OUT, HIDDEN]
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price-low, price-high, popular, rating]
        - name: minPrice
          in: query
          schema:
            type: string
        - name: maxPrice
          in: query
          schema:
            type: string
        - name: minRating
          in: query
          schema:
            type: string
        - name: inStock
          in: query
          description: Filter by stock availability (e.g., "true")
          schema:
            type: string
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ProductList'

    post:
      tags: [Products]
      summary: Create a new product
      description: Requires SELLER or SUPER_ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Product'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/products/my:
    get:
      tags: [Products]
      summary: List current seller's products
      description: Requires SELLER or SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, ACTV, SOLD_OUT, HIDDEN]
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price-low, price-high, popular, rating]
      responses:
        '200':
          description: Paginated list of seller's products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ProductList'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Get product detail by ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Product'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Products]
      summary: Update a product
      description: Requires SELLER (own product) or SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Product'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Products]
      summary: Delete a product
      description: Requires SELLER (own product) or SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Null'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/products/{id}/status:
    patch:
      tags: [Products]
      summary: Change product status
      description: Requires SELLER (own product) or SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Product'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Orders - Buyer
  # ──────────────────────────────────────────────
  /api/orders:
    get:
      tags: [Orders]
      summary: List buyer's orders
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, CONFIRMED, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
        - name: itemStatus
          in: query
          schema:
            type: string
            enum: [PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED]
        - name: paymentStatus
          in: query
          schema:
            type: string
            enum: [UNPAID, PAID]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OrderList'

    post:
      tags: [Orders]
      summary: Create an order (without payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/orders/checkout:
    post:
      tags: [Orders]
      summary: Create an order and initiate payment in one step
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutOrderRequest'
      responses:
        '201':
          description: Order created with payment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order detail by ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update order status (buyer cancel/refund)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/{id}/pay:
    patch:
      tags: [Orders]
      summary: Mark an order as paid
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayOrderRequest'
      responses:
        '200':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Orders - Seller
  # ──────────────────────────────────────────────
  /api/orders/sales:
    get:
      tags: [Orders - Seller]
      summary: List seller's sales orders
      description: Requires SELLER or SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, CONFIRMED, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
        - name: itemStatus
          in: query
          schema:
            type: string
            enum: [PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED]
        - name: paymentStatus
          in: query
          schema:
            type: string
            enum: [UNPAID, PAID]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated sales list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OrderList'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/orders/sales/summary:
    get:
      tags: [Orders - Seller]
      summary: Get seller sales summary statistics
      description: Requires SELLER or SUPER_ADMIN role.
      responses:
        '200':
          description: Sales summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SalesSummary'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/orders/sales/{id}:
    get:
      tags: [Orders - Seller]
      summary: Get seller order detail
      description: Requires SELLER or SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/sales/{orderId}/items/{itemId}/status:
    patch:
      tags: [Orders - Seller]
      summary: Update individual order item status
      description: Requires SELLER or SUPER_ADMIN role.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemStatusRequest'
      responses:
        '200':
          description: Item status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/sales/{orderId}/items/{itemId}/payment:
    patch:
      tags: [Orders - Seller]
      summary: Confirm payment for an individual order item
      description: Requires SELLER or SUPER_ADMIN role.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item payment confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Order'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/sales/bulk-status:
    post:
      tags: [Orders - Seller]
      summary: Bulk update status for multiple order items
      description: Requires SELLER or SUPER_ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkItemStatusRequest'
      responses:
        '200':
          description: Bulk status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_BulkResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ──────────────────────────────────────────────
  # Admin - Dashboard
  # ──────────────────────────────────────────────
  /api/admin/dashboard:
    get:
      tags: [Admin - Dashboard]
      summary: Get admin dashboard overview
      description: Requires SUPER_ADMIN role.
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Dashboard'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ──────────────────────────────────────────────
  # Admin - Users
  # ──────────────────────────────────────────────
  /api/admin/users:
    get:
      tags: [Admin - Users]
      summary: List all users with filters
      description: Requires SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            type: string
            enum: [SUPER_ADMIN, SELLER, BUYER]
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTV, SUSP, INAC]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserList'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Admin - Users]
      summary: Create a new user (admin-initiated)
      description: Requires SUPER_ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AdminUser'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/users/export:
    get:
      tags: [Admin - Users]
      summary: Export users as CSV
      description: Requires SUPER_ADMIN role. Returns a CSV file download.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            type: string
            enum: [SUPER_ADMIN, SELLER, BUYER]
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTV, SUSP, INAC]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/users/bulk/status:
    post:
      tags: [Admin - Users]
      summary: Bulk change user statuses
      description: Requires SUPER_ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBulkStatusRequest'
      responses:
        '200':
          description: Bulk status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_BulkResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/users/{id}:
    get:
      tags: [Admin - Users]
      summary: Get user detail by ID
      description: Requires SUPER_ADMIN role.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
