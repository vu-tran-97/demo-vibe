# ══════════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /api/auth/login or /api/auth/signup

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID (MongoDB ObjectId)

    PageParam:
      name: page
      in: query
      schema:
        type: string
        default: '1'
      description: Page number (1-based)

    LimitParam:
      name: limit
      in: query
      schema:
        type: string
        default: '20'
      description: Items per page

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error: VALIDATION_ERROR
            message: "email must be an email, password must be longer than or equal to 8 characters"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error: FORBIDDEN
            message: "You do not have permission to perform this action"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error: NOT_FOUND
            message: "Resource not found"

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error: UNAUTHORIZED
            message: "Authentication is required"

  schemas:
    # ── Envelope schemas ──
    ErrorResponse:
      type: object
      required: [success, data, error, message]
      properties:
        success:
          type: boolean
          example: false
        data:
          type: 'null'
          example: null
        error:
          type: string
          description: Machine-readable error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error message
          example: "email must be an email"

    ApiResponse_Null:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: 'null'
          example: null

    ApiResponse_Message:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            message:
              type: string
          required: [message]

    # ── Auth schemas ──
    SignupRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          maxLength: 100
          example: user@example.com
        password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase, one lowercase, one number, and one special character
          example: MyP@ssw0rd
        name:
          type: string
          maxLength: 50
          example: John Doe
        nickname:
          type: string
          minLength: 2
          maxLength: 30
          description: Korean, English, numbers, underscore, and space allowed
          example: john_doe

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 100
          example: user@example.com
        password:
          type: string
          example: MyP@ssw0rd

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Refresh token from login/signup response

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Email verification token from the verification email

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 100

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: Password reset token from the reset email
        newPassword:
          type: string
          minLength: 8
          description: Must contain at least one uppercase, one lowercase, one number, and one special character

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        nickname:
          type: string
          minLength: 2
          maxLength: 30
          description: Korean, English, numbers, underscore, and space allowed
        profileImageUrl:
          type: string
          format: uri

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          description: Must contain at least one uppercase, one lowercase, one number, and one special character

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        nickname:
          type: string
          nullable: true
        emailVerified:
          type: boolean
        profileImageUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [BUYER, SELLER, SUPER_ADMIN]

    AuthTokensData:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token TTL in seconds

    RefreshResultData:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer

    ApiResponse_AuthTokens:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AuthTokensData'

    ApiResponse_RefreshResult:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/RefreshResultData'

    ApiResponse_User:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/User'

    # ── Product schemas ──
    CreateProductRequest:
      type: object
      required: [prdNm, prdDc, prdPrc, prdCtgrCd, prdImgUrl, stckQty]
      properties:
        prdNm:
          type: string
          maxLength: 200
          description: Product name
          example: Handmade Ceramic Mug
        prdDc:
          type: string
          maxLength: 10000
          description: Product description
        prdPrc:
          type: number
          minimum: 0
          description: Product price
          example: 35000
        prdSalePrc:
          type: number
          minimum: 0
          description: Sale price (optional)
          example: 28000
        prdCtgrCd:
          type: string
          enum: [CERAMICS, TEXTILES, ART, JEWELRY, HOME, FOOD]
          description: Product category code
        prdSttsCd:
          type: string
          enum: [DRAFT, ACTV]
          description: Initial product status (default varies)
        prdImgUrl:
          type: string
          description: Main product image URL
        prdImgUrls:
          type: array
          items:
            type: string
          maxItems: 5
          description: Additional product image URLs
        stckQty:
          type: integer
          minimum: 0
          description: Stock quantity
          example: 100
        srchTags:
          type: array
          items:
            type: string
          description: Search tags

    UpdateProductRequest:
      type: object
      properties:
        prdNm:
          type: string
          maxLength: 200
        prdDc:
          type: string
          maxLength: 10000
        prdPrc:
          type: number
          minimum: 0
        prdSalePrc:
          type: number
          minimum: 0
        prdCtgrCd:
          type: string
          enum: [CERAMICS, TEXTILES, ART, JEWELRY, HOME, FOOD]
        prdSttsCd:
          type: string
          enum: [DRAFT, ACTV]
        prdImgUrl:
          type: string
        prdImgUrls:
          type: array
          items:
            type: string
          maxItems: 5
        stckQty:
          type: integer
          minimum: 0
        srchTags:
          type: array
          items:
            type: string

    UpdateProductStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [DRAFT, ACTV, SOLD_OUT, HIDDEN]

    Product:
      type: object
      properties:
        id:
          type: string
        prdNm:
          type: string
        prdDc:
          type: string
        prdPrc:
          type: number
        prdSalePrc:
          type: number
          nullable: true
        prdCtgrCd:
          type: string
        prdSttsCd:
          type: string
        prdImgUrl:
          type: string
        prdImgUrls:
          type: array
          items:
            type: string
        stckQty:
          type: integer
        srchTags:
          type: array
          items:
            type: string
        sellerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApiResponse_Product:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Product'

    ApiResponse_ProductList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Product'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    # ── Order schemas ──
    OrderItem:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1

    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          minItems: 1
        shipAddr:
          type: string
          maxLength: 500
          description: Shipping address
        shipRcvrNm:
          type: string
          maxLength: 50
          description: Receiver name
        shipTelno:
          type: string
          maxLength: 20
          description: Receiver phone number
        shipMemo:
          type: string
          maxLength: 200
          description: Shipping memo

    CheckoutOrderRequest:
      type: object
      required: [items, paymentMethod]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          minItems: 1
        paymentMethod:
          type: string
          enum: [BANK_TRANSFER, EMAIL_INVOICE]
        shipAddr:
          type: string
          maxLength: 500
        shipRcvrNm:
          type: string
          maxLength: 50
        shipTelno:
          type: string
          maxLength: 20
        shipMemo:
          type: string
          maxLength: 200

    PayOrderRequest:
      type: object
      required: [paymentMethod]
      properties:
        paymentMethod:
          type: string
          enum: [BANK_TRANSFER, EMAIL_INVOICE]

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [PAID, CONFIRMED, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
        reason:
          type: string
          maxLength: 500
          description: Reason for status change (e.g., cancellation reason)

    UpdateItemStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [CONFIRMED, SHIPPED, DELIVERED]
        trackingNumber:
          type: string
          maxLength: 100
          description: Shipping tracking number (required when status is SHIPPED)

    BulkItemStatusRequest:
      type: object
      required: [itemIds, status]
      properties:
        itemIds:
          type: array
          items:
            type: string
          minItems: 1
          description: List of order item IDs
        status:
          type: string
          enum: [CONFIRMED, SHIPPED, DELIVERED]
        trackingNumber:
          type: string
          maxLength: 100

    Order:
      type: object
      properties:
        id:
          type: string
        buyerId:
          type: string
        orderSttsCd:
          type: string
          enum: [PENDING, PAID, CONFIRMED, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
        paymentMethod:
          type: string
          nullable: true
        totalAmount:
          type: number
        shipAddr:
          type: string
          nullable: true
        shipRcvrNm:
          type: string
          nullable: true
        shipTelno:
          type: string
          nullable: true
        shipMemo:
          type: string
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              productId:
                type: string
              quantity:
                type: integer
              unitPrice:
                type: number
              totalPrice:
                type: number
              itemSttsCd:
                type: string
              trackingNumber:
                type: string
